<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON VOYAGER: ELITE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-overlay">
    <h1>NEON VOYAGER</h1>
    <p>CLICK OR TAP TO INITIALIZE SYSTEMS</p>
</div>

<div id="ui">
    <div class="stats-row">
        <div>
            <div style="font-size: 20px; font-weight: bold;">SCORE: <span id="score">0</span></div>
            <div id="lives" style="font-size: 16px; color: #f05;">LIVES: ❤️❤️❤️</div>
            <div class="dash-container"><div id="dash-bar"></div></div>
        </div>
        <div style="text-align: right;">
            <div id="wave-display" style="font-size: 18px; color: #fa0;">WAVE: 1</div>
            <div id="combo-display">x1</div>
            <div id="weather-display" style="font-size: 12px; color: #0ff; letter-spacing: 2px;">CLEAR SKY</div>
        </div>
    </div>
</div>

<div id="wave-announcer">WAVE 1</div>
<div id="game-over-modal">
    <h1 style="color: #f05; margin: 0 0 10px 0;">SYSTEM FAILURE</h1>
    <p style="font-size: 18px; margin-bottom: 5px;">FINAL SCORE: <span id="final-score">0</span></p>
    <p style="font-size: 14px; color: #fa0;">MAX WAVE REACHED: <span id="final-wave">1</span></p>
    <button class="restart-btn" onclick="location.reload()">Reboot System</button>
</div>

<canvas id="gameCanvas"></canvas>
<script src="script.js"></script>
</body>
</html>
